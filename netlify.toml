[build]
  command   = "npm install"
  publish   = "public"
  functions = "netlify/functions"

# Forward all /api/* requests to the serverless function
[[redirects]]
  from   = "/api/*"
  to     = "/.netlify/functions/api/:splat"
  status = 200

# SPA fallback — all other routes serve index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

[functions]
  node_bundler = "esbuild"

[dev]
  command    = "node server.js"
  port       = 3000
  targetPort = 3000
